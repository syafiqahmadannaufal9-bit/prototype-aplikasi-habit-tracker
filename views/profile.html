<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/tailwind.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        green: { 500: '#10B981' },
                        blue: { 500: '#5BA4C9' }
                    }
                }
            }
        }
    </script>
</head>
<body class="pb-24 bg-gray-50">

    <!-- Header -->
    <header class="px-6 pt-8 pb-4 flex justify-between items-center animate-slide-up relative z-10">
        <h1 class="text-2xl font-bold text-white">Profile</h1>
    </header>

    <!-- Profile Section -->
    <section class="px-6 mt-4 animate-slide-up delay-100">
        <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 flex flex-col items-center">
            
            <div class="relative mb-4 group transition-transform hover:scale-105 active:scale-95 cursor-pointer">
                <div class="w-24 h-24 rounded-full overflow-hidden border-4 border-white shadow-lg">
                    <img id="profile-img" src="https://i.pravatar.cc/150?img=11" alt="Profile Name" class="w-full h-full object-cover">
                </div>
                <div class="absolute bottom-0 right-0 bg-[var(--primary)] text-white w-8 h-8 rounded-full flex items-center justify-center border-2 border-white shadow-sm">
                    <i class="fa-solid fa-camera text-xs"></i>
                </div>
            </div>
            
            <h2 class="text-xl font-bold text-gray-900 flex items-center gap-2 mt-2">
                <span id="display-username">Loading...</span>
                <i class="fa-solid fa-circle-check text-blue-500 text-sm"></i>
            </h2>
            <p class="text-sm text-gray-500 font-medium mt-1" id="display-email">loading...</p>
            
            <span id="auth-badge" class="mt-3 px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-semibold flex items-center gap-1">
                <i class="fa-solid fa-envelope text-sm mt-px"></i> Email Authenticated
            </span>
        </div>
    </section>

    <!-- Profile Updates List -->
    <section class="px-6 mt-6 animate-slide-up delay-200">
        <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-3 px-2">Account Options</h3>
        <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100">
            
            <!-- Edit Username -->
            <button onclick="editUsername()" class="w-full px-5 py-4 flex items-center justify-between border-b border-gray-100 hover:bg-gray-50 active:bg-gray-100 transition-all active:scale-[0.98] text-left group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-lg group-hover:scale-110 transition-transform">
                        <i class="fa-regular fa-id-badge"></i>
                    </div>
                    <div>
                        <h4 class="text-base font-semibold text-gray-900">Edit Username</h4>
                        <p class="text-xs font-medium text-gray-500">Change your display name</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-gray-300"></i>
            </button>

            <!-- Theme Toggle -->
            <button onclick="toggleTheme()" class="w-full px-5 py-4 flex items-center justify-between hover:bg-gray-50 active:bg-gray-100 transition-all active:scale-[0.98] text-left group border-b border-gray-100">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-green-50 text-green-500 flex items-center justify-center text-lg group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-palette"></i>
                    </div>
                    <div>
                        <h4 class="text-base font-semibold text-gray-900">App Theme</h4>
                        <p class="text-xs font-medium text-gray-500">Switch color mode</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-gray-300"></i>
            </button>
            
            <!-- Reset Password -->
            <button onclick="resetPassword()" class="w-full px-5 py-4 flex items-center justify-between hover:bg-gray-50 active:bg-gray-100 transition-all active:scale-[0.98] text-left group border-b border-gray-100">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-purple-50 text-purple-500 flex items-center justify-center text-lg group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-envelope-open-text"></i>
                    </div>
                    <div>
                        <h4 class="text-base font-semibold text-gray-900">Reset Password</h4>
                        <p class="text-xs font-medium text-gray-500">Send reset link to email</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-gray-300"></i>
            </button>
            
            <!-- Log Out -->
            <button onclick="logout()" class="w-full px-5 py-4 flex items-center justify-between hover:bg-red-50 active:bg-red-100 transition-all active:scale-[0.98] text-left group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center text-lg group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </div>
                    <div>
                        <h4 class="text-base font-semibold text-red-600">Log Out</h4>
                        <p class="text-xs font-medium text-red-400">Securely sign out</p>
                    </div>
                </div>
            </button>

        </div>
    </section>

    <!-- Tab Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-2 flex items-center justify-between z-50 shadow-[0_-4px_25px_rgba(0,0,0,0.05)] text-gray-400">
        <a href="index.html" class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-solid fa-house text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Home</span>
        </a>
        <a href="calendar.html" class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-regular fa-calendar text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Calendar</span>
        </a>
        
        <div class="w-16 flex justify-center relative -top-6">
            <a href="add_habit.html" class="w-14 h-14 bg-[var(--primary)] theme-bg-update rounded-full flex items-center justify-center text-white text-2xl shadow-[0_8px_20px_-6px_rgba(0,0,0,0.5)] transform transition hover:scale-105 active:scale-95 border-4 border-white">
                <i class="fa-solid fa-plus"></i>
            </a>
        </div>
        
        <a href="statistics.html" class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Stats</span>
        </a>
        <a href="profile.html" class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16 text-[var(--primary)] theme-text-update">
            <i class="fa-regular fa-user text-xl mb-1"></i>
            <span class="text-[10px] font-bold">Profile</span>
        </a>
    </nav>

    <script src="../js/app.js"></script>
    <script>
        let _currentUser = null;

        // === Edit Username Modal System ===
        function showEditUsernameModal(currentUsername) {
            let modal = document.getElementById('edit-username-modal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'edit-username-modal';
                modal.className = 'fixed inset-0 bg-gray-900/40 z-[120] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 px-6 backdrop-blur-sm';
                modal.innerHTML = `
                    <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl transform scale-95 transition-transform duration-300 popup-content" id="edit-username-box">
                        <div class="w-14 h-14 rounded-full flex items-center justify-center text-2xl mb-4 mx-auto" id="edit-username-icon" style="background-color: rgba(91, 164, 201, 0.1); color: #5BA4C9;">
                            <i class="fa-solid fa-id-badge"></i>
                        </div>
                        <h3 class="text-xl font-bold text-gray-900 text-center mb-2">Edit Username</h3>
                        <p class="text-gray-500 text-center text-sm mb-6">Enter your new display name</p>
                        <div class="mb-6">
                            <input type="text" id="edit-username-input" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-[var(--primary)] transition-colors text-gray-900 font-medium placeholder-gray-400" placeholder="Enter new username" autocomplete="off">
                        </div>
                        <div class="flex gap-3">
                            <button type="button" class="flex-1 py-3.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition-colors" id="edit-username-cancel">Cancel</button>
                            <button type="button" class="flex-1 py-3.5 font-bold rounded-xl transition-colors text-white shadow-md focus:outline-none" id="edit-username-save" style="background-color: var(--primary);">Save</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
            }
            
            // Set input value and theme color
            const inputEl = document.getElementById('edit-username-input');
            inputEl.value = currentUsername;
            
            const theme = document.documentElement.getAttribute('data-theme') || 'green';
            const iconContainer = document.getElementById('edit-username-icon');
            if (theme === 'blue') {
                iconContainer.style.backgroundColor = 'rgba(91, 164, 201, 0.1)';
                iconContainer.style.color = '#5BA4C9';
            } else {
                iconContainer.style.backgroundColor = 'rgba(16, 185, 129, 0.1)';
                iconContainer.style.color = '#10B981';
            }
            
            const close = () => {
                modal.classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('edit-username-box').classList.remove('scale-100');
                document.getElementById('edit-username-box').classList.add('scale-95');
            };
            
            const saveBtn = document.getElementById('edit-username-save');
            const cancelBtn = document.getElementById('edit-username-cancel');
            
            // Clear old event listeners by cloning and replacing
            const newSaveBtn = saveBtn.cloneNode(true);
            const newCancelBtn = cancelBtn.cloneNode(true);
            saveBtn.parentNode.replaceChild(newSaveBtn, saveBtn);
            cancelBtn.parentNode.replaceChild(newCancelBtn, cancelBtn);
            
            // Get fresh references
            const freshSaveBtn = document.getElementById('edit-username-save');
            const freshCancelBtn = document.getElementById('edit-username-cancel');
            const freshInputEl = document.getElementById('edit-username-input');
            
            // Setup event listeners
            freshInputEl.onkeypress = (e) => {
                if (e.key === 'Enter') {
                    freshSaveBtn.click();
                }
            };
            
            freshCancelBtn.onclick = close;
            freshSaveBtn.onclick = async () => {
                const newName = freshInputEl.value.trim();
                if (!newName) {
                    showToast('Username cannot be empty', 'error');
                    return;
                }
                if (newName === currentUsername) {
                    close();
                    return;
                }
                
                close();
                await updateUsername(newName);
            };
            
            // Open modal with animation
            modal.classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('edit-username-box').classList.remove('scale-95');
            document.getElementById('edit-username-box').classList.add('scale-100');
            
            // Focus input
            setTimeout(() => freshInputEl.focus(), 100);
        }

        async function updateUsername(newName) {
            try {
                // Update UI first for instant feedback
                document.getElementById('display-username').innerText = newName;
                
                // Persist to Supabase
                if (supabaseClient && _currentUser) {
                    await supabaseClient.from('profiles').update({ full_name: newName }).eq('id', _currentUser.id);
                    await supabaseClient.auth.updateUser({ data: { full_name: newName } });
                    showToast(`Username updated to ${newName}!`);
                } else {
                    showToast(`Username updated to ${newName}!`);
                }
            } catch (err) {
                console.error('Update username error:', err);
                showToast('Failed to update username. Please try again.', 'error');
            }
        }

        async function editUsername() {
            const currentName = document.getElementById('display-username').innerText;
            showEditUsernameModal(currentName);
        }

        async function resetPassword() {
            if (!_currentUser) return;
            const email = _currentUser.email;
            if (confirm(`Send a password reset link to ${email}?`)) {
                try {
                    const { error } = await supabaseClient.auth.resetPasswordForEmail(email);
                    if (error) {
                        showToast('Error: ' + error.message, 'error');
                    } else {
                        showToast('Reset link sent! Please check your email.', 'success');
                    }
                } catch (err) {
                    showToast('Failed to send reset link.', 'error');
                }
            }
        }

        function logout() {
            handleSignOut();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // Fetch User Details to display
            if (supabaseClient) {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user) {
                    _currentUser = user;
                    const name = user.user_metadata?.full_name || 'User';
                    const email = user.email;
                    document.getElementById('display-username').innerText = name;
                    document.getElementById('display-email').innerText = email;
                    document.getElementById('profile-img').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&color=fff`;

                    // Show correct auth provider badge
                    const provider = user.app_metadata?.provider || 'email';
                    const badge = document.getElementById('auth-badge');
                    if (badge) {
                        if (provider === 'google') {
                            badge.innerHTML = '<i class="fa-brands fa-google text-sm mt-px"></i> Google Authenticated';
                        } else {
                            badge.innerHTML = '<i class="fa-solid fa-envelope text-sm mt-px"></i> Email Authenticated';
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
