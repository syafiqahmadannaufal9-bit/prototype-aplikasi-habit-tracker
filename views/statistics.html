<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics - Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../css/tailwind.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        green: { 500: '#10B981' },
                        blue: { 500: '#5BA4C9' }
                    }
                }
            }
        }
    </script>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="px-6 pt-8 pb-4 flex justify-between items-center animate-slide-up relative z-10">
        <h1 class="text-2xl font-bold text-white">Statistics</h1>
        <button class="w-10 h-10 rounded-full bg-white/20 text-white backdrop-blur-md border border-white/30 flex items-center justify-center hover:bg-white/30 transition shadow-sm">
            <i class="fa-solid fa-ellipsis-vertical"></i>
        </button>
    </header>

    <!-- Time Period Tabs -->
    <section class="px-6 animate-slide-up delay-100 relative z-10">
        <div class="flex bg-white/20 backdrop-blur-md border border-white/30 p-1 rounded-full w-full mx-auto" id="period-tabs">
            <button onclick="setStatPeriod('daily')" class="flex-1 py-2 text-sm font-semibold rounded-full bg-white shadow-sm text-[var(--primary)] transition-all active-tab">Daily</button>
            <button onclick="setStatPeriod('weekly')" class="flex-1 py-2 text-sm font-medium rounded-full text-white/80 hover:text-white transition-all">Weekly</button>
            <button onclick="setStatPeriod('monthly')" class="flex-1 py-2 text-sm font-medium rounded-full text-white/80 hover:text-white transition-all">Monthly</button>
        </div>
    </section>

    <!-- Overview Cards -->
    <section class="px-6 mt-6 flex gap-4 animate-slide-up delay-200">
        <div class="flex-1 bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
            <div class="w-10 h-10 rounded-full bg-orange-100 text-orange-500 justify-center items-center flex mb-3 text-lg">
                <i class="fa-solid fa-fire"></i>
            </div>
            <p class="text-sm text-gray-500 font-medium">Longest Streak</p>
            <h3 id="streak-value" class="text-2xl font-bold text-gray-900 mt-1">0 Days</h3>
        </div>
        <div class="flex-1 bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
            <div class="w-10 h-10 rounded-full bg-green-100 text-green-500 justify-center items-center flex mb-3 text-lg" id="completion-icon-wrapper">
                <i class="fa-solid fa-trophy"></i>
            </div>
            <p class="text-sm text-gray-500 font-medium">Completion</p>
            <h3 id="completion-value" class="text-2xl font-bold text-gray-900 mt-1">0%</h3>
        </div>
    </section>

    <!-- Main Chart -->
    <section class="px-6 mt-6 animate-slide-up delay-300">
        <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <h2 class="text-lg font-bold text-gray-900">Activity</h2>
                    <p class="text-xs text-gray-500" id="activity-subtitle">Since Apr 2026</p>
                </div>
            </div>
            <div class="h-48 relative w-full">
                <canvas id="activityChart"></canvas>
            </div>
        </div>
    </section>

    <!-- Category Distribution -->
    <section class="px-6 mt-6 animate-slide-up delay-400">
        <h2 class="text-xl font-bold text-gray-900 mb-4">Category Distribution</h2>
        <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 flex items-center justify-between">
            <div class="w-1/2 relative h-32">
                <canvas id="categoryChart"></canvas>
            </div>
            <div id="category-legend" class="w-1/2 pl-4 flex flex-col gap-3">
                <!-- Dynamically populated -->
            </div>
        </div>
    </section>
    <!-- Habit Performance Summary -->
    <section class="px-6 mt-6 animate-slide-up delay-400">
        <h2 class="text-xl font-bold text-gray-900 mb-4">Habit Performance Summary</h2>
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 overflow-x-auto">
            <table class="w-full text-left border-collapse" style="table-layout: fixed; min-width: 600px;">
                <thead>
                    <tr class="bg-gray-50 border-b border-gray-100 text-[10px] text-gray-500 uppercase font-semibold">
                        <th class="py-3 px-4 w-1/3 rounded-tl-xl">Habit Name</th>
                        <th class="py-3 px-4 w-1/6 text-center">Completion Rate</th>
                        <th class="py-3 px-4 w-1/6 text-center">Current Streak</th>
                        <th class="py-3 px-4 w-1/6 text-center">Longest Streak</th>
                        <th class="py-3 px-4 w-1/6 text-center rounded-tr-xl">Status Trend</th>
                    </tr>
                </thead>
                <tbody id="performance-table-body" class="divide-y divide-gray-100">
                    <!-- Dynamically populated via JS -->
                </tbody>
            </table>
        </div>
    </section>

    <!-- Insights & Reports -->
    <section class="px-6 mt-6 animate-slide-up delay-400 flex flex-col mb-6">
        <h2 class="text-xl font-bold text-gray-900 mb-4">Key Insights</h2>
        <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
            <ul id="insights-list" class="space-y-3">
                <!-- Dynamically populated -->
            </ul>
        </div>
    </section>

    <!-- Tab Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-2 flex items-center justify-between z-50 shadow-[0_-4px_25px_rgba(0,0,0,0.05)] text-gray-400">
        <a href="index.html" class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-solid fa-house text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Home</span>
        </a>
        <a href="calendar.html" class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-regular fa-calendar text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Calendar</span>
        </a>
        
        <div class="w-16 flex justify-center relative -top-6">
            <a href="add_habit.html" class="w-14 h-14 bg-[var(--primary)] theme-bg-update rounded-full flex items-center justify-center text-white text-2xl shadow-[0_8px_20px_-6px_rgba(0,0,0,0.5)] transform transition hover:scale-105 active:scale-95 border-4 border-white">
                <i class="fa-solid fa-plus"></i>
            </a>
        </div>
        
        <a href="statistics.html" class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16 text-[var(--primary)] theme-text-update">
            <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
            <span class="text-[10px] font-bold">Stats</span>
        </a>
        <a href="profile.html" class="nav-item active:scale-90 transition-transform flex flex-col items-center gap-1 p-2 w-16">
            <i class="fa-regular fa-user text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Profile</span>
        </a>
    </nav>
    
    <!-- floating theme toggle removed -->

    <script src="../js/habits.js"></script>
    <script src="../js/app.js"></script>
    <script>
        let activityChartInstance = null;
        let categoryChartInstance = null;
        
        function getThemeColors() {
            const style = getComputedStyle(document.body);
            return {
                primary: style.getPropertyValue('--primary').trim() || '#10B981',
                primaryLight: style.getPropertyValue('--primary-light').trim() || '#D1FAE5',
                accent: style.getPropertyValue('--accent').trim() || '#34D399'
            };
        }

        function initCharts(period = 'daily') {
            const colors = getThemeColors();
            const stats = getStatsData(period);
            
            // Adjust Completion Icon color Based on Theme
            const completionWrapper = document.getElementById('completion-icon-wrapper');
            if (completionWrapper) {
                 completionWrapper.style.backgroundColor = colors.primaryLight;
                 completionWrapper.style.color = colors.primary;
            }

            // Update overview cards with real data
            document.getElementById('streak-value').textContent = `${stats.longestStreak} Days`;
            document.getElementById('completion-value').textContent = `${stats.completionRate}%`;
            
            // Account opening date
            const loginDate = getLoginDate();
            const loginObj = new Date(loginDate);
            document.getElementById('activity-subtitle').innerText = `Since ${loginObj.toLocaleString('default', { month: 'short', year: 'numeric' })}`;

            // Activity Bar Chart
            const ctxActivity = document.getElementById('activityChart').getContext('2d');
            
            if (activityChartInstance) activityChartInstance.destroy();
            
            activityChartInstance = new Chart(ctxActivity, {
                type: 'bar',
                data: {
                    labels: stats.labels,
                    datasets: [{
                        label: 'Completion',
                        data: stats.data,
                        backgroundColor: colors.primary,
                        borderRadius: 6,
                        borderSkipped: false,
                        barThickness: period === 'monthly' ? 16 : 12
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#111827',
                            padding: 10,
                            displayColors: false,
                            callbacks: {
                                label: function(context) { return context.raw + '%'; }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            grid: { color: '#F3F4F6', drawBorder: false },
                            border: { display: false },
                            ticks: { display: false }
                        },
                        x: {
                            grid: { display: false, drawBorder: false },
                            border: { display: false },
                            ticks: { color: '#9CA3AF', font: { family: 'Inter', size: 11, weight: '500' } }
                        }
                    }
                }
            });

            // Category Doughnut Chart — from real data
            const ctxCategory = document.getElementById('categoryChart').getContext('2d');
            
            if (categoryChartInstance) categoryChartInstance.destroy();

            const catEntries = Object.entries(stats.catCounts);
            const catLabels = catEntries.length > 0 ? catEntries.map(e => e[0]) : ['No data'];
            const catData = catEntries.length > 0 ? catEntries.map(e => e[1]) : [1];
            
            // Generate colors for each category
            const paletteColors = [colors.primary, colors.accent, '#F59E0B', '#8B5CF6', '#EF4444', '#EC4899', '#14B8A6', '#6366F1', '#E5E7EB'];
            const catColors = catLabels.map((_, i) => paletteColors[i % paletteColors.length]);

            // Update legend
            const legendContainer = document.getElementById('category-legend');
            if (legendContainer) {
                legendContainer.innerHTML = catLabels.map((label, i) => `
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full shrink-0" style="background-color: ${catColors[i]}"></span>
                        <span class="text-sm font-medium text-gray-700 truncate">${label}</span>
                    </div>
                `).join('');
            }
            
            categoryChartInstance = new Chart(ctxCategory, {
                type: 'doughnut',
                data: {
                    labels: catLabels,
                    datasets: [{
                        data: catData,
                        backgroundColor: catColors,
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#111827',
                            padding: 10,
                            displayColors: true
                        }
                    }
                }
            });
            
            // Generate Performance Table
            generatePerformanceTable();

            // Generate Insights
            generateInsights(stats, period);
        }

        function generateInsights(stats, period) {
            const list = document.getElementById('insights-list');
            if (!list) return;
            list.innerHTML = '';
            
            const theme = document.documentElement.getAttribute('data-theme') || 'green';
            const isBlue = theme === 'blue';
            
            // 1. Trend Insight
            if (stats.data.length > 1) {
                const last = stats.data[stats.data.length - 1];
                const prev = stats.data[stats.data.length - 2];
                let diff = last - prev;
                let trendMsg = diff >= 0 
                    ? `<span class="${isBlue ? 'text-[#5BA4C9]' : 'text-[#10B981]'} font-bold"><i class="fa-solid fa-arrow-trend-up mr-1"></i> Up ${diff}%</span> from previous period.`
                    : `<span class="text-red-500 font-bold"><i class="fa-solid fa-arrow-trend-down mr-1"></i> Down ${Math.abs(diff)}%</span> from previous period. Keep pushing!`;
                addInsight(list, "Performance Trend", trendMsg, 'fa-chart-line', 'primary');
            }

            // 2. Category Focus
            const catEntries = Object.entries(stats.catCounts);
            if (catEntries.length > 0) {
                catEntries.sort((a,b) => b[1] - a[1]);
                const bestCat = catEntries[0][0];
                addInsight(list, "Primary Focus Area", `Most of your habits belong to the <b>${bestCat}</b> category.`, 'fa-bullseye', 'orange');
            }
            
            // 3. Consistency
            if (stats.longestStreak > 2) {
                addInsight(list, "Strong Consistency", `You reached a ${stats.longestStreak}-day perfect streak. Outstanding!`, 'fa-fire', 'red');
            } else {
                addInsight(list, "Building Consistency", "Try linking a new habit to an existing routine to build a streak.", 'fa-lightbulb', 'yellow');
            }
        }

        function generatePerformanceTable() {
            const tbody = document.getElementById('performance-table-body');
            if (!tbody) return;
            tbody.innerHTML = '';

            const habits = getHabits();
            if (habits.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="py-6 text-center text-gray-500 text-sm">No habits available</td></tr>`;
                return;
            }

            const todayStr = getLocalDateString();
            const c = getCompletions();

            let html = '';
            habits.forEach(habit => {
                // Kalkulasi
                const accuracy = getMonthlyAccuracy(habit.id, todayStr);
                const currentStreak = getHabitStreak(habit.id, todayStr);
                const longestStreak = getHabitLongestStreak(habit.id);

                // Hitung Trend (7 hari terakhir vs 7 hari sebelumnya)
                let current7 = 0;
                let prev7 = 0;
                const todayDate = new Date(todayStr);
                for(let i=0; i<14; i++) {
                    let d = new Date(todayDate);
                    d.setDate(d.getDate() - i);
                    let dStr = getLocalDateString(d);
                    if(c[dStr] && c[dStr][habit.id]) {
                        if(i < 7) current7++;
                        else prev7++;
                    }
                }
                const isUp = current7 >= prev7;

                html += `
                <tr class="hover:bg-gray-50/50 transition-colors">
                    <td class="py-4 px-4">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-xl bg-gray-100 text-gray-600 flex items-center justify-center text-sm shrink-0">
                                ${habit.iconHtml || '<i class="fa-solid fa-star"></i>'}
                            </div>
                            <span class="font-bold text-sm text-gray-800 truncate">${habit.name}</span>
                        </div>
                    </td>
                    <td class="py-4 px-4 text-center">
                        <div class="flex flex-col items-center gap-1.5">
                            <span class="text-xs font-bold text-gray-700">${accuracy}%</span>
                            <div class="w-full bg-gray-100 rounded-full h-1.5 overflow-hidden">
                                <div class="bg-[var(--primary)] h-full rounded-full" style="width: ${accuracy}%"></div>
                            </div>
                        </div>
                    </td>
                    <td class="py-4 px-4 text-center">
                        <span class="inline-flex items-center gap-1 text-xs font-bold text-orange-500 bg-orange-50 px-2 py-1 rounded-md">
                            <i class="fa-solid fa-fire"></i> ${currentStreak}
                        </span>
                    </td>
                    <td class="py-4 px-4 text-center">
                        <span class="inline-flex items-center gap-1 text-xs font-bold text-yellow-600 bg-yellow-50 px-2 py-1 rounded-md">
                            <i class="fa-solid fa-trophy"></i> ${longestStreak}
                        </span>
                    </td>
                    <td class="py-4 px-4 text-center">
                        ${isUp 
                            ? '<span class="inline-flex items-center gap-1 text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded border border-emerald-100 uppercase tracking-wide"><i class="fa-solid fa-caret-up"></i> Up</span>'
                            : '<span class="inline-flex items-center gap-1 text-[10px] font-bold text-red-600 bg-red-50 px-2 py-1 rounded border border-red-100 uppercase tracking-wide"><i class="fa-solid fa-caret-down"></i> Down</span>'
                        }
                    </td>
                </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        function addInsight(list, title, msg, iconClass, colorMode) {
            const theme = document.documentElement.getAttribute('data-theme') || 'green';
            let iconBg = theme === 'blue' ? 'bg-blue-50 text-[#5BA4C9]' : 'bg-green-50 text-[#10B981]';
            if(colorMode === 'orange') iconBg = 'bg-orange-50 text-orange-500';
            if(colorMode === 'yellow') iconBg = 'bg-yellow-50 text-yellow-500';
            if(colorMode === 'red') iconBg = 'bg-red-50 text-red-500';

            list.innerHTML += `
                <li class="flex gap-4 p-3 bg-gray-50 rounded-2xl border border-gray-100 items-start shadow-sm transition-transform hover:-translate-y-0.5">
                    <div class="w-10 h-10 rounded-full flex shrink-0 items-center justify-center text-lg ${iconBg}">
                        <i class="fa-solid ${iconClass}"></i>
                    </div>
                    <div>
                        <h4 class="text-gray-900 font-bold mb-1 text-sm">${title}</h4>
                        <p class="text-xs text-gray-500 leading-snug">${msg}</p>
                    </div>
                </li>
            `;
        }
        
        // Handle Tab Swapping
        let currentPeriod = 'daily';
        function setStatPeriod(newPeriod) {
            currentPeriod = newPeriod;
            
            // Update UI tabs
            const tabs = document.getElementById('period-tabs').querySelectorAll('button');
            const themeColors = getThemeColors();
            
            tabs.forEach(tab => {
                if(tab.innerText.toLowerCase() === newPeriod) {
                    tab.className = `flex-1 py-2 text-sm font-semibold rounded-full bg-white shadow-sm transition-all active-tab`;
                    tab.style.color = themeColors.primary;
                } else {
                    tab.className = `flex-1 py-2 text-sm font-medium rounded-full text-white/80 hover:text-white transition-all`;
                    tab.style.color = '';
                }
            });
            
            // Re-init chart with new data
            initCharts(newPeriod);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // Sync habits from Supabase before rendering charts
            await syncHabitsFromSupabase();
            initCharts(currentPeriod);
            
            // Re-render charts when theme changes
            document.addEventListener('themeChanged', () => {
                setTimeout(() => {
                    const activeTab = document.querySelector('.active-tab');
                    if (activeTab) {
                        const themeColors = getThemeColors();
                        activeTab.style.color = themeColors.primary;
                    }
                    initCharts(currentPeriod);
                }, 100);
            });
        });
    </script>
</body>
</html>
